<!-- layouts/partials/mathjax.html -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      tags: 'ams'   // 自动编号
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-chtml.js" id="MathJax-script" async></script>

<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    TeX: { 
      extensions: ["AMSmath.js", "AMSsymbols.js"]   // 确保这两行存在
    }
  });
</script>
