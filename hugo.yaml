baseURL: "https://dovex4.github.io/"
title: 胶带的博客
copyright: "[©2026 胶带的博客](https://dovex4.github.io/)"
theme: PaperMod
languageCode: zh-cn

enableInlineShortcodes: true # shortcode，类似于模板变量，可以在写 markdown 的时候便捷地插入，官方文档中有一个视频讲的很通俗
hasCJKLanguage: true # 是否有 CJK 的字符
enableRobotsTXT: true # 允许生成 robots.txt
buildDrafts: false # 构建时是否包括草稿
buildFuture: false # 构建未来发布的内容
buildExpired: false # 构建过期的内容
enableEmoji: true # 允许 emoji
pygmentsUseClasses: true
defaultContentLanguage: zh # 顶部首先展示的语言界面
defaultContentLanguageInSubdir: false # 是否要在地址栏加上默认的语言代码


languages:
  zh:
    languageName: "中文" # 展示的语言名
    weight: 1 # 权重
    taxonomies: # 分类系统
      category: categories
      tag: tags
    # https://gohugo.io/content-management/menus/#define-in-site-configuration
    menus:
      main:
        - name: 首页
          pageRef: /
          weight: 4 # 控制在页面上展示的前后顺序
        - name: 归档
          pageRef: archives/
          weight: 5
        - name: 分类
          pageRef: categories/
          weight: 10
        - name: 标签
          pageRef: tags/
          weight: 10
        - name: 搜索
          pageRef: search/
          weight: 20
        - name: 关于
          pageRef: about/
          weight: 21



# search
outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  profileMode:
    enabled: true # 必须设为 true
    title: "你好👋 我是胶带"
    subtitle: |
      这是一个终身学习者的博客

      正在探索各种有趣的知识😊
    imageUrl: "avatar.png" # 头像路径
    imageTitle: "Avatar"
    imageWidth: 240
    imageHeight: 240
    buttons:
      - name: "我的博客"
        url: "posts"
      - name: "关于我"
        url: "about"

#  homeInfoParams: 
#    Title: "你好，我是胶带👋"
#    Content: |
#      正在探索各种有趣的知识

  fuseOpts:
    isCaseSensitive: false # 是否大小写敏感
    shouldSort: true # 是否排序
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    # limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
    includeMatches: true

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  # 核心配置：确保没有把 tags 排除在外
  showFullTextContent: false
  displayStats: true
  # 检查这里是否误选了隐藏
  hideMeta: false

# comments
  comments: true
  giscus:
    repo: "DoveX4/DoveX4.github.io"
    repoId: "R_kgDOSDLGyw"
    category: "Announcements"
    categoryId: "DIC_kwDOSDLGy84C66L9"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "1"
    inputPosition: "top"
    lightTheme: "light"
    darkTheme: "dark"
    lang: "zh-CN"
    crosslogin: "anonymous"
    dataLoading: "lazy"

  assets:
    favicon: "favicon.png"
    favicon16x16: "favicon.png"
    favicon32x32: "favicon.png"
    apple_touch_icon: "favicon.png"
    safari_pinned_tab: "favicon.png"
    disableHLJS: true

markup:
  goldmark:
    renderer:
      unsafe: true # 可以 unsafe，有些 html 标签和样式可能需要
    extentions:
      extras:
        mark: true
        insert: true
        subscript: true
        superscript: true
    parser:
      attribute:
        block: true
      wrapStandAloneImageWithinParagraph: false
      
  highlight:
    anchorLineNos: false # 不要给行号设置锚标
    codeFences: true # 代码围栏
    noClasses: false # TODO: 不知道干啥的，暂时没必要了解，不影响展示
    lineNos: true # 代码行
    lineNumbersInTable: false # 不要设置成 true，否则如果文章开头是代码的话，摘要会由一大堆数字(即代码行号)开头文章
    # 这里设置 style 没用，得自己加 css
    # style: "github-dark"
    # style: monokai

module:
  mounts:
    - source: 'content/posts/attachments'
      target: 'static/attachments'
    # 保留原有的 content 挂载（通常 Hugo 会自动处理，但显式写出更安全）
    - source: 'content'
      target: 'content'
